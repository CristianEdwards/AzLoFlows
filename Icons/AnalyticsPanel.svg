<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 216" fill="none">
  <defs>
    <filter id="panelShadow" x="-8%" y="-4%" width="120%" height="112%">
      <feDropShadow dx="-3" dy="5" stdDeviation="6" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#panelShadow)">
    <!-- Left depth edge (panel thickness) -->
    <path d="M18,24 L30,20 L30,200 L18,204 Z" fill="#2d3041"/>

    <!-- Bottom depth edge -->
    <path d="M18,204 L30,200 L240,192 L228,196 Z" fill="#22252e"/>

    <!-- Main face background (parallelogram) -->
    <path d="M30,20 L240,12 L240,192 L30,200 Z" fill="#eef0f5"/>

    <!-- Transformed content aligned to isometric face -->
    <g transform="matrix(1,-0.038,0,1,30,20)">
      <!-- Header bar (dark, rounded top corners) -->
      <rect x="0" y="0" width="210" height="38" rx="10" fill="#3c404c"/>
      <rect x="0" y="12" width="210" height="26" fill="#3c404c"/>

      <!-- Traffic light dots -->
      <circle cx="20" cy="19" r="5" fill="#ff5f57"/>
      <circle cx="36" cy="19" r="5" fill="#febd2e"/>
      <circle cx="52" cy="19" r="5" fill="#28c840"/>

      <!-- Address bar -->
      <rect x="68" y="12" width="90" height="14" rx="7" fill="#555a67"/>

      <!-- Horizontal menu lines (right side of header) -->
      <rect x="172" y="13" width="26" height="2.5" rx="1.2" fill="#555a67"/>
      <rect x="172" y="19.5" width="20" height="2.5" rx="1.2" fill="#555a67"/>
      <rect x="172" y="26" width="23" height="2.5" rx="1.2" fill="#555a67"/>

      <!-- Content area (white) -->
      <rect x="6" y="44" width="198" height="128" rx="4" fill="#ffffff"/>

      <!-- Subtle cross-hatch grid -->
      <rect x="6" y="73" width="198" height="0.5" fill="#e4e5ea"/>
      <rect x="6" y="102" width="198" height="0.5" fill="#e4e5ea"/>
      <rect x="6" y="131" width="198" height="0.5" fill="#e4e5ea"/>
      <rect x="72" y="44" width="0.5" height="128" fill="#e4e5ea"/>
      <rect x="138" y="44" width="0.5" height="128" fill="#e4e5ea"/>

      <!-- Line chart (lower-left) -->
      <path d="M16,152 L36,136 L58,142 L80,118 L100,126 L118,110"
        fill="none" stroke="#4d8dff" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="36" cy="136" r="3" fill="#4d8dff"/>
      <circle cx="80" cy="118" r="3" fill="#4d8dff"/>
      <circle cx="118" cy="110" r="3" fill="#4d8dff"/>

      <!-- Pie chart (lower-right) -->
      <circle cx="168" cy="108" r="28" fill="#e4e5ea"/>
      <path d="M168,108 L168,80 A28,28 0 0,1 191,124 Z" fill="#4d8dff"/>
      <path d="M168,108 L191,124 A28,28 0 0,1 159,135 Z" fill="#ff5f57"/>
      <path d="M168,108 L159,135 A28,28 0 0,1 140,111 Z" fill="#febd2e"/>
      <path d="M168,108 L140,111 A28,28 0 0,1 149,88 Z" fill="#28c840"/>
      <path d="M168,108 L149,88 A28,28 0 0,1 168,80 Z" fill="#a78bfa"/>
    </g>
  </g>
</svg>
